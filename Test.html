<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2b5876);
        color: white;
        text-align: center;
        padding-top: 60px;
    }

    div h1 {
        font-size: 36px;
        margin-bottom: 20px;
        color: #00ffd5;
        text-shadow: 0 0 10px rgba(0,255,213,0.5);
    }

    h2 {
        font-weight: 400;
        margin-bottom: 20px;
    }

    select {
        padding: 12px;
        width: 250px;
        border: none;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
        margin-bottom: 15px;
    }

    button {
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #00ffd5;
        color: black;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #00c2a8;
        transform: scale(1.05);
    }

    #result {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        color: #ffd166;
    }

    select:focus {
        box-shadow: 0 0 10px #00ffd5;
    }
</style>
</head>
<body>
    <div>
    <h1>Let's Play Rock Paper Scissors!</h1>
    </div>
    <h2>Choose Either of the Above : </h2>
    <select id="input">
        <option>Rock</option>
        <option>Paper</option>
        <option>Scissors</option>
    </select>
    <button onclick="saveChoice();">Play</button>
    <h2 id="result"></h2>
</body>

<script>
    let input;
    let text;
    let comp = 0;
    function saveChoice(){
        input = document.getElementById('input').value.toLowerCase();
        comp = Math.floor(Math.random() * 3) + 1;
        if(comp === 1){
            comp = 'rock';
        } else if(comp === 2){
            comp = 'paper';
        } else{
            comp = 'scissors';
        }

        if(input === 'rock' && comp === 'rock'){
            text = 'Computer chose rock, It\'s a tie!';
        } 
        else if(input === 'paper' && comp === 'paper'){
            text = 'Computer chose paper, It\'s a tie!';
        } 
        else if(input === 'scissors' && comp === 'scissors'){
            text = 'Computer chose scissors, It\'s a tie!';
        } 
        else if(input === 'rock'&& comp === 'scissors'){
            text = 'Computer chose scissors, YOU WIN!';
        } 
        else if(input === 'paper' && comp === 'scissors'){
            text = 'Computer chose scissors, YOU LOSE!';
        } 
        else if(input === 'paper'&& comp === 'rock'){
            text = 'Computer chose rock, YOU WIN!';
        } 
        else if(input === 'scissors' && comp === 'rock'){
            text = 'Computer chose rock, YOU LOSE!';
        }
        else if(input === 'rock' && comp === 'paper'){
            text = 'Computer chose paper, YOU LOSE!';
        }
        else if(input === 'scissors' && comp === 'paper'){
            text = 'Computer chose paper, YOU WIN!';
        }
        else{
            text = 'Invalid Input, Please try again!'
        }
        document.getElementById('result').innerHTML = text;
    }
</script>
</html>

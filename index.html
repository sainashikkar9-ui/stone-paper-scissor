<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* RESET + FIXED BACKGROUND */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    min-height: 100vh;
    font-family: Arial, sans-serif;

    /* FIXED BACKGROUND */
    background: linear-gradient(135deg, #1e1e2f, #2b5876);
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;

    color: white;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    padding: 40px 20px 0;
}

/* MAIN CONTENT */
.container{
    width: 100%;
    max-width: 900px;
    margin: auto;
}

/* TITLE */
div h1 {
    font-size: 36px;
    margin-bottom: 20px;
    color: #00ffd5;
    text-shadow: 0 0 10px rgba(0,255,213,0.5);
}

/* SUBTITLE */
h2 {
    font-weight: 400;
    margin-bottom: 20px;
    line-height: 1.5;
}

/* SELECT DROPDOWN */
select { 
    padding: 12px;
    width: 250px;
    max-width: 100%;

    border: none;
    border-radius: 8px;
    outline: none;

    font-size: 16px;

    text-align: center;

    margin: 0 auto 15px;

    display: block;

    transition: 0.3s;
}

select:focus {
    box-shadow: 0 0 10px #00ffd5;
}

/* BUTTON */
button {
    padding: 12px 20px;
    font-size: 16px;

    border: none;
    border-radius: 8px;
    cursor: pointer;

    background: #00ffd5;
    color: black;
    font-weight: bold;

    transition: 0.3s;
}

button:hover {
    background: #00c2a8;
    transform: scale(1.02);
}

/* RESULT TEXT */
#result {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    color: #ffd166;
    /*-webkit-text-stroke: black 1px;*/
    text-shadow: 0px 0px 5px rgb(0, 255, 132);
    word-wrap: break-word;
}

/* FOOTER */
#footer{
    margin-top: 50px;
    width: 100%;

    padding: 18px 10px;

    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);

    color: #ffffffcc;
    font-size: 15px;

    border-top: 1px solid rgba(255,255,255,0.15);
}

/* SCORE SYSTEM */
#score{
    margin-top: 25px;

    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* SCORE CARDS */
#score h3{
    min-width: 120px;

    padding: 15px 20px;

    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.15);

    border-radius: 14px;

    backdrop-filter: blur(10px);

    box-shadow: 0 0 12px rgba(0,0,0,0.25);

    font-size: 20px;
    font-weight: bold;

    transition: 0.3s;
}

/* HOVER EFFECT */
#score h3:hover{
    transform: translateY(-3px) scale(1.03);
}

/* INDIVIDUAL COLORS */
#win{
    color: #00ff88;
    text-shadow: 0 0 8px rgba(0,255,136,0.7);
}

#lose{
    color: #ff5e5e;
    text-shadow: 0 0 8px rgba(255,94,94,0.7);
}

#tie{
    color: #ffd166;
    text-shadow: 0 0 8px rgba(255,209,102,0.7);
}

/* MOBILE */
@media (max-width: 600px){

    #score{
        gap: 12px;
    }

    #score h3{
        width: 90%;
        font-size: 18px;
    }
}
/* =========================
   MOBILE RESPONSIVE
========================= */
@media (max-width: 600px){

    body{
        padding-top: 30px;
    }

    div h1{
        font-size: 28px;
        line-height: 1.3;
    }

    h2{
        font-size: 18px;
        padding: 0 10px;
    }

    select{
        width: 100%;
        font-size: 15px;
    }

    button{
        width: 90%;
        font-size: 15px;
    }

    #result{
        font-size: 18px;
    }

    #footer{
        font-size: 13px;
        padding: 15px 8px;
    }
}

/* =========================
   TABLET RESPONSIVE
========================= */
@media (min-width: 601px) and (max-width: 992px){

    div h1{
        font-size: 32px;
    }

    h2{
        font-size: 20px;
    }

    select{
        width: 300px;
    }

    button{
        font-size: 16px;
    }

    #result{
        font-size: 20px;
    }
}

/* =========================
   LARGE DESKTOP
========================= */
@media (min-width: 1200px){

    div h1{
        font-size: 44px;
    }

    h2{
        font-size: 24px;
    }

    select{
        width: 320px;
        font-size: 17px;
    }

    button{
        font-size: 17px;
        padding: 14px 24px;
    }

    #result{
        font-size: 26px;
    }

    #footer{
        font-size: 16px;
    }
}
</style>
</head>
<body>
    <div>
    <h1>Let's Play Rock Paper Scissors!</h1>
    </div>
    <h2>Choose Either of the Above : </h2>
    <select id="input">
        <option>Rock</option>
        <option>Paper</option>
        <option>Scissors</option>
    </select>
    <button onclick="saveChoice();">Play</button>
    <h2 id="result"></h2>
    <button onclick="reset();">Reset Score</button>
    <div id="score">
        <h3 id="tie"></h3>
        <h3 id="win"></h3>
        <h3 id="lose"></h3>
    </div>
    <footer id="footer">Developed with passion by Sai A. Nashikkar</footer>
</body>

<script>
    let input;
    let text;
    let comp = 0;
    let score = {
        tie: 0,
        win: 0,
        lose: 0
    };
    document.getElementById('tie').innerHTML = `Tie: ${score.tie}`;
    document.getElementById('win').innerHTML = `Win: ${score.win}`;
    document.getElementById('lose').innerHTML = `Lose: ${score.lose}`;
    function saveChoice(){
        input = document.getElementById('input').value.toLowerCase();
        comp = Math.floor(Math.random() * 3) + 1;
        if(comp === 1){
            comp = 'rock';
        } else if(comp === 2){
            comp = 'paper';
        } else{
            comp = 'scissors';
        }

        if(input === 'rock' && comp === 'rock'){
            text = 'Computer chose rock, It\'s a tie!';
        } 
        else if(input === 'paper' && comp === 'paper'){
            text = 'Computer chose paper, It\'s a tie!';
        } 
        else if(input === 'scissors' && comp === 'scissors'){
            text = 'Computer chose scissors, It\'s a tie!';
        } 
        else if(input === 'rock'&& comp === 'scissors'){
            text = 'Computer chose scissors, YOU WIN!';
        } 
        else if(input === 'paper' && comp === 'scissors'){
            text = 'Computer chose scissors, YOU LOSE!';
        } 
        else if(input === 'paper'&& comp === 'rock'){
            text = 'Computer chose rock, YOU WIN!';
        } 
        else if(input === 'scissors' && comp === 'rock'){
            text = 'Computer chose rock, YOU LOSE!';
        }
        else if(input === 'rock' && comp === 'paper'){
            text = 'Computer chose paper, YOU LOSE!';
        }
        else if(input === 'scissors' && comp === 'paper'){
            text = 'Computer chose paper, YOU WIN!';
        }
        else{
            text = 'Invalid Input, Please try again!'
        }
        
        if(text === 'Computer chose rock, It\'s a tie!' || text === 'Computer chose paper, It\'s a tie!' || text === 'Computer chose scissors, It\'s a tie! ') {
            score.tie += 1;
        }
        else if(text === 'Computer chose scissors, YOU WIN!' || text === 'Computer chose rock, YOU WIN!' || text === 'Computer chose paper, YOU WIN!') {
            score.win += 1;
        }
        else {
            score.lose += 1;
        }

        document.getElementById('result').innerHTML = text;
        document.getElementById('tie').innerHTML = `Tie: ${score.tie}`;
        document.getElementById('win').innerHTML = `Win: ${score.win}`;
        document.getElementById('lose').innerHTML = `Lose: ${score.lose}`;
    }

    function reset() {
        score.tie = 0;
        score.win= 0;
        score.lose = 0;
        document.getElementById('tie').innerHTML = `Tie: ${score.tie}`;
        document.getElementById('win').innerHTML = `Win: ${score.win}`;
        document.getElementById('lose').innerHTML = `Lose: ${score.lose}`;
    }
</script>
</html>
